<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Connect Four</h1>
        
        <div class="game-info">
            <div class="player-info">
                <span class="player-indicator" id="playerIndicator">Player 1's Turn</span>
                <span class="player-circle player1"></span>
            </div>
            <button id="resetBtn" class="reset-btn">Reset Game</button>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- Game board will be generated by JavaScript -->
        </div>

        <div class="controls">
            <p id="gameStatus" class="game-status">Game in progress...</p>
        </div>

        <div class="instructions">
            <h3>How to Play</h3>
            <ul>
                <li>Click on a column to drop your piece</li>
                <li>Red goes first (Player 1)</li>
                <li>Yellow is Player 2</li>
                <li>Connect 4 pieces in a row horizontally, vertically, or diagonally to win</li>
                <li>The board fills from bottom to top</li>
            </ul>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
